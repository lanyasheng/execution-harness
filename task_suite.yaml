skill_id: "execution-harness"
version: "1.0"
description: "Evaluates execution-harness skill's ability to guide harness improvements: Ralph persistent loops, handoff documents, tool error escalation, rate limit recovery, context estimation, and safe state management"

tasks:
  # === Core Capability: Ralph Mode Knowledge ===
  - id: "eh-ralph-explain"
    description: "Must correctly explain Ralph persistent execution loop mechanism and its safety invariants"
    prompt: |
      I'm dispatching a long-running bugfix task to a Claude Code agent in tmux. The agent keeps stopping after fixing one file, but there are 5 more files to fix. How can execution-harness help? Explain the mechanism and the safety guarantees.
    judge:
      type: "contains"
      expected:
        - "Stop hook"
        - "ralph"
        - "iteration"
        - "safety"
    timeout_seconds: 120

  # === Ralph Init & State File ===
  - id: "eh-ralph-init-usage"
    description: "Must show correct ralph-init.sh usage and state file format"
    prompt: |
      I want to enable persistent execution for session nc-bugfix-WI456 with a maximum of 30 iterations. Show me the exact command and what state file it creates.
    judge:
      type: "contains"
      expected:
        - "ralph-init.sh"
        - "nc-bugfix-WI456"
        - "30"
        - "max_iterations"
        - "active"
    timeout_seconds: 90

  # === Safety: When NOT to Block ===
  - id: "eh-ralph-safety-invariants"
    description: "Must enumerate all safety conditions where Ralph must NOT block a stop"
    prompt: |
      A colleague is worried that Ralph mode will prevent the agent from ever stopping, even in error scenarios. What are all the safety invariants that guarantee Ralph will NOT block a stop?
    judge:
      type: "llm-rubric"
      rubric: |
        Check that the response covers ALL of these safety conditions:
        1. Context usage >= 95% (context overflow protection): +0.2
        2. Authentication errors (401/403): +0.2
        3. Cancel signal with TTL: +0.2
        4. Stale state / idle timeout (2 hours): +0.2
        5. Max iterations reached: +0.2
        Score the sum. Must mention at least 4 of 5 to pass.
      pass_threshold: 0.8
    timeout_seconds: 120

  # === Handoff Document Pattern ===
  - id: "eh-handoff-structure"
    description: "Must describe the handoff document structure with all 5 required sections"
    prompt: |
      I'm running a multi-stage orchestrator batch: plan -> implement -> verify. Context gets compressed between stages and the implement agent loses the planning decisions. How should I use handoff documents to preserve context? Show the document structure.
    judge:
      type: "contains"
      expected:
        - "Decided"
        - "Rejected"
        - "Risks"
        - "Files Modified"
        - "Remaining"
        - "handoffs"
    timeout_seconds: 120

  # === Tool Error Escalation ===
  - id: "eh-tool-error-escalation"
    description: "Must describe the 3-tier escalation strategy for repeated tool failures"
    prompt: |
      An agent keeps calling `cargo build` but it fails every time because cargo isn't installed in the container. It's retried 8 times now. What pattern from execution-harness prevents this infinite retry loop, and what are the escalation tiers?
    judge:
      type: "contains"
      expected:
        - "1-2"
        - "3-4"
        - "5"
        - "alternative"
        - "last-tool-error"
    timeout_seconds: 120

  # === Rate Limit Detection ===
  - id: "eh-rate-limit-detection"
    description: "Must explain tmux-based rate limit detection mechanism"
    prompt: |
      Three of my dispatched agents in tmux sessions hit API rate limits and are stuck. How does execution-harness detect this and what's the recovery mechanism?
    judge:
      type: "contains"
      expected:
        - "tmux"
        - "rate"
        - "limit"
        - "send-keys"
    timeout_seconds: 90

  # === Context Usage Estimation ===
  - id: "eh-context-estimation"
    description: "Must explain the transcript tail-read technique for lightweight context estimation"
    prompt: |
      I need to monitor context usage across 10 running Claude Code sessions without killing performance. The transcript JSONL files can be 100MB+. How does execution-harness estimate context usage efficiently?
    judge:
      type: "contains"
      expected:
        - "4KB"
        - "tail"
        - "input_tokens"
        - "context_window"
    timeout_seconds: 90

  # === Atomic Write Pattern ===
  - id: "eh-atomic-write"
    description: "Must explain write-then-rename pattern for state file safety"
    prompt: |
      The ralph-stop-hook and session-monitor might both try to read/write the same state file simultaneously. How does execution-harness prevent file corruption?
    judge:
      type: "contains"
      expected:
        - "write_atomic"
        - "tmp"
        - "mv"
        - "rename"
    timeout_seconds: 60

  # === Integration: dispatch.sh + Ralph ===
  - id: "eh-dispatch-integration"
    description: "Must explain how Ralph integrates with existing dispatch.sh workflow"
    prompt: |
      Walk me through the full lifecycle: dispatching a task with ralph mode, what hooks fire, what state files are created, and how the agent eventually stops. Reference the specific scripts involved.
    judge:
      type: "llm-rubric"
      rubric: |
        Check the response covers the full lifecycle:
        1. dispatch.sh calls ralph-init.sh to create state file: +0.2
        2. Claude Code runs in tmux session: +0.1
        3. When agent tries to stop, Stop hook fires ralph-stop-hook.sh: +0.2
        4. Hook reads state, blocks stop, injects "continue working" message: +0.2
        5. Iteration counter increments on each block: +0.1
        6. Eventually stops via: max iterations, cancel signal, stale timeout, or context limit: +0.2
        Score the sum. Must >= 0.8 to pass.
      pass_threshold: 0.8
    timeout_seconds: 120

  # === Anti-pattern: What NOT to Build ===
  - id: "eh-anti-patterns"
    description: "Must correctly identify what execution-harness does NOT do and why"
    prompt: |
      I want to add a HUD statusline, multi-model team support (Claude + Codex + Gemini), and a keyword detector that auto-triggers skills. Should I build these into execution-harness?
    judge:
      type: "llm-rubric"
      rubric: |
        The response must correctly reject all three additions with reasons:
        1. No HUD — already have session-monitor + DingTalk notifications: +0.33
        2. No multi-model teams — focused on Claude only, not Codex/Gemini: +0.33
        3. No keyword detector — use existing skill trigger mechanism: +0.34
        Must reject all three to pass. Score 0.0 if any is accepted or recommended.
      pass_threshold: 0.9
    timeout_seconds: 90
